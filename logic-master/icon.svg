<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- アプリアイコン：紺の背景に「P→Q」と王冠 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <text x="256" y="180" font-size="110" text-anchor="middle" fill="#fbbf24">👑</text>
  <text x="256" y="330" font-size="120" font-weight="bold" text-anchor="middle"
        font-family="sans-serif" fill="url(#txt)">P→Q</text>
  <text x="256" y="430" font-size="64" font-weight="bold" text-anchor="middle"
        font-family="sans-serif" fill="#94a3b8">¬Q→¬P</text>
</svg>
